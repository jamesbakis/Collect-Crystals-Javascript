<html style="background-color: rgb(175,225,175);">
    <body>
        <div style="width: 700px; height: 700px; border: solid; position: absolute; left: -3px; top: -3px"></div>

        <p style="position: absolute; left: 800px; top: 300px; font-size: 20px; width: 400px;">Use the arrow keys to move the green man around the field,
